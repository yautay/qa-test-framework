services:
  minio:
    image: minio/minio:RELEASE.2026-01-28T01-07-00Z
    container_name: nc-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2026-01-21T05-28-06Z
    container_name: nc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-visual-baselines}
      MINIO_BUCKET_QUOTA: ${MINIO_BUCKET_QUOTA:-20GiB}
      VISUAL_READONLY_USER: ${VISUAL_READONLY_USER:-visual-readonly}
      VISUAL_READONLY_PASSWORD: ${VISUAL_READONLY_PASSWORD:-readonly-pass-change-me}
      VISUAL_RELEASE_USER: ${VISUAL_RELEASE_USER:-visual-release}
      VISUAL_RELEASE_PASSWORD: ${VISUAL_RELEASE_PASSWORD:-release-pass-change-me}
    volumes:
      - ./policies:/policies:ro
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing "local/$$MINIO_BUCKET" &&
        sed "s|__MINIO_BUCKET__|$$MINIO_BUCKET|g" /policies/readonly.json > /tmp/readonly.json &&
        sed "s|__MINIO_BUCKET__|$$MINIO_BUCKET|g" /policies/release.json > /tmp/release.json &&
        mc admin user add local "$$VISUAL_READONLY_USER" "$$VISUAL_READONLY_PASSWORD" || true &&
        mc admin user add local "$$VISUAL_RELEASE_USER" "$$VISUAL_RELEASE_PASSWORD" || true &&
        mc admin policy detach local visual-readonly --user "$$VISUAL_READONLY_USER" || true &&
        mc admin policy detach local visual-release --user "$$VISUAL_RELEASE_USER" || true &&
        mc admin policy remove local visual-readonly || true &&
        mc admin policy remove local visual-release || true &&
        mc admin policy create local visual-readonly /tmp/readonly.json &&
        mc admin policy create local visual-release /tmp/release.json &&
        mc admin policy attach local visual-readonly --user "$$VISUAL_READONLY_USER" &&
        mc admin policy attach local visual-release --user "$$VISUAL_RELEASE_USER" &&
        mc quota set "local/$$MINIO_BUCKET" --size "$$MINIO_BUCKET_QUOTA"
    restart: "no"

volumes:
  minio-data:
