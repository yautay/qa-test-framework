options:
  max-time: 30

definitions:
  caches:
    node-ui: framework/visual/ui/node_modules

  steps:
    - step: &lint_format_typecheck
        name: Lint Format Typecheck
        image: python:3.13.2-slim
        caches:
          - pip
        script:
          - python -m pip install --upgrade uv
          - uv lock --check --python 3.13.2 --no-managed-python
          - uv sync --frozen --python 3.13.2 --no-managed-python --extra dev
          - .venv/bin/python -m ruff check framework tools qa/aso
          - .venv/bin/python -m black --check framework tools qa/aso
          - .venv/bin/python -m mypy framework

    - step: &security
        name: Security
        image: python:3.13.2-slim
        caches:
          - pip
        script:
          - python -m pip install --upgrade uv
          - uv lock --check --python 3.13.2 --no-managed-python
          - uv sync --frozen --python 3.13.2 --no-managed-python --extra dev
          - .venv/bin/python -m bandit -r -x qa --skip B101,B105,B106,B110,B112,B404,B603,B607,B311 framework tools
          - .venv/bin/python -m pip_audit

    - step: &aso_tests
        name: ASO Tests
        image: python:3.13.2-slim
        caches:
          - pip
        script:
          - export HEADLESS=1
          - export IS_GRID_AVAILABLE=0
          - export REPORTING_ENABLED=0
          - export ALLURE_ENABLED=0
          - export PYTEST_HTML_ENABLED=0
          - export RECORD_VIDEO=0
          - python -m pip install --upgrade uv
          - uv lock --check --python 3.13.2 --no-managed-python
          - uv sync --frozen --python 3.13.2 --no-managed-python --extra dev
          - .venv/bin/python framework/pytest_discovery_guard.py
          - .venv/bin/python tools/scenarios/verify_scenarios.py
          - .venv/bin/python -m pytest -m aso -q
        artifacts:
          - artifacts/**

    - step: &frontend_ui
        name: Frontend UI
        image: node:22-slim
        caches:
          - node-ui
        script:
          - cd framework/visual/ui
          - npm ci
          - npm run test:unit
          - npm run build:fast
          - git diff --exit-code -- dist

pipelines:
  branches:
    develop:
      - parallel:
          - step: *lint_format_typecheck
          - step: *security
          - step: *aso_tests
          - step: *frontend_ui
    netquarner:
      - parallel:
          - step: *lint_format_typecheck
          - step: *security
          - step: *aso_tests
          - step: *frontend_ui

  pull-requests:
    "**":
      - parallel:
          - step: *lint_format_typecheck
          - step: *security
          - step: *aso_tests
          - step: *frontend_ui
