[pytest]
testpaths =
    qa/e2e
    qa/api
    qa/visual
    qa/aso
python_files = test_*.py *_test.py Test*.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers -p no:anyio -p no:pytest_playwright -p no:playwright -p no:pytest_base_url -p no:base_url
filterwarnings =
    ignore::urllib3.exceptions.InsecureRequestWarning
markers =
    aso: technical framework and contract tests (ASO)
    e2e: end-to-end tests
    api: api tests
    account: account tests
    configurator: configurator tests
    visual: visual regression tests
    extended_timeout: extend Playwright default action/navigation timeout to 60s
    wp: word-press tests
    smoke: smoke tests
    slow: slow tests
    target(id): explicit runtime target id used for base_url resolution
    scenario(description): optional business scenario description per test method
