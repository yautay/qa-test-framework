[pytest]
testpaths =
    qa/e2e
    qa/api
    qa/visual
    qa/aso
python_files = test_*.py *_test.py Test*.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers -p no:anyio -p no:pytest_playwright -p no:playwright -p no:pytest_base_url -p no:base_url
filterwarnings =
    ignore::urllib3.exceptions.InsecureRequestWarning
markers =
    aso: technical framework and contract tests (ASO)
    e2e: end-to-end tests
    e2e_b2b: tests for netcorner nuxt b2b suite
    e2e_account: account tests (e2e)
    e2e_configurator: configurator tests (e2e)
    e2e_core: core high-signal e2e regression tests
    e2e_employee_program: employee program tests (e2e)
    e2e_layout: structural layout / UI presence tests (e2e)
    e2e_orders: orders tests (e2e)
    e2e_pl: tests for netcorner nuxt pl suite
    e2e_search: search-related tests (e2e)
    e2e_smoke: smoke tests for e2e suite
    e2e_setup: environment setup and data seeding tests (e2e)
    api: api tests
    visual: visual regression tests
    visual_wp: word-press visual tests
    order(index): explicit execution order for setup steps (pytest-order)
    target(id): explicit runtime target id used for base_url resolution
    scenario(description): optional business scenario description per test method
