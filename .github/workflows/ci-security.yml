name: CI Security

on:
  push:
    branches:
      - develop
      - netquarner
  pull_request:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.2"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade uv
          uv lock --check --python 3.13.2 --no-managed-python
          uv sync --frozen --python 3.13.2 --no-managed-python --extra dev

      - name: Run Bandit and pip-audit
        run: |
          .venv/bin/python -m bandit -r -x qa --skip B101,B105,B106,B110,B112,B404,B603,B607,B311 framework tools
          .venv/bin/python -m pip_audit
