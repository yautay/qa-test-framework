name: CI ASO

on:
  push:
    branches:
      - develop
      - netquarner
  pull_request:

permissions:
  contents: read

jobs:
  aso-tests:
    runs-on: ubuntu-latest
    env:
      HEADLESS: "1"
      IS_GRID_AVAILABLE: "0"
      REPORTING_ENABLED: "0"
      ALLURE_ENABLED: "0"
      PYTEST_HTML_ENABLED: "0"
      RECORD_VIDEO: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.2"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade uv
          uv lock --check --python 3.13.2 --no-managed-python
          uv sync --frozen --python 3.13.2 --no-managed-python --extra dev

      - name: Verify pytest discovery
        run: .venv/bin/python framework/pytest_discovery_guard.py

      - name: Verify scenarios
        run: .venv/bin/python tools/scenarios/verify_scenarios.py

      - name: Run ASO tests
        run: .venv/bin/python -m pytest -m aso -q

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aso-artifacts
          path: artifacts/
          if-no-files-found: ignore
