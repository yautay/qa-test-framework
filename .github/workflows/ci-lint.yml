name: CI Lint Format Typecheck

on:
  push:
    branches:
      - develop
      - netquarner
  pull_request:

permissions:
  contents: read

jobs:
  lint-format-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.2"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade uv
          uv lock --check --python 3.13.2 --no-managed-python
          uv sync --frozen --python 3.13.2 --no-managed-python --extra dev

      - name: Ruff lint
        run: .venv/bin/python -m ruff check framework tools qa/aso

      - name: Black format check
        run: .venv/bin/python -m black --check framework tools qa/aso

      - name: MyPy typecheck
        run: .venv/bin/python -m mypy framework
