<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Visual Report</title>

  <link rel="stylesheet" href="./assets/bootstrap.min.css">

  <style>
    .thumb { max-width: 220px; max-height: 120px; object-fit: contain; cursor: zoom-in; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .small-col { white-space: nowrap; }
    .modal-full {
      max-width: 98vw;
      width: 98vw;
      height: 98vh;
      margin: 0 auto;
    }
    .modal-full .modal-dialog {
      height: 100%;
    }
    .modal-full .modal-content {
      height: 100%;
      border-radius: 1rem;
      overflow: hidden;
    }
    .modal-full .modal-body {
      height: calc(98vh - 72px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .toolbar .form-select {
      min-width: 160px;
    }
    .slot-grid {
      display: grid;
      gap: 1rem;
      height: 100%;
    }
    .slot-card {
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 0.75rem;
      background: #fff;
      padding: 0.5rem 0.75rem 0.25rem;
      display: flex;
      flex-direction: column;
      min-height: 220px;
      position: relative;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .slot-divider {
      height: 1px;
      background: rgba(0,0,0,0.08);
      margin: 0.25rem 0;
    }
    .slot-media {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 210px;
    }
    .slot-media img {
      transition: transform 0.15s ease;
    }
    .fit-group .btn {
      min-width: 64px;
    }
    .prompt-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .prompt-card {
      background: #fff;
      padding: 1.25rem 1.5rem;
      border-radius: 0.75rem;
      box-shadow: 0 20px 45px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .prompt-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .prompt-text {
      margin-bottom: 0.5rem;
    }
    .prompt-hints {
      color: #6c757d;
      font-size: 0.85rem;
    }
  </style>

  <script>
    window.__VRT_RESULTS__ = __VRT_INLINE_RESULTS__;
  </script>
</head>

<body class="bg-light">
<div id="app" class="container-fluid p-3"></div>

<script src="./assets/vue.global.prod.js"></script>
<script src="./assets/bootstrap.bundle.min.js"></script>
<script type="module" src="./assets/app.module.js"></script>
</body>
</html>
